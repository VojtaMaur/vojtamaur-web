<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D trajektorie v krychli</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --accent: #c40000;
      --panel: #f4f4f4;
      --panel-border: #d8d8d8;
      --gap: 8px;
      --outer-pad: 4px;
      --inner-pad: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      padding: var(--outer-pad);
    }

    .layout {
      width: 100%;
      height: 100%;
      display: flex;
      gap: var(--gap);
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .panel,
    .sim-panel {
      flex: 0 0 auto;
      height: 100%;
      width: auto;
      max-width: calc((100% - var(--gap)) / 2);
      aspect-ratio: 1 / 1;
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel {
      background: var(--panel);
      padding: var(--inner-pad);
      display: flex;
      flex-direction: column;
    }

    .panel-inner {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      height: 100%;
      overflow: auto;
      align-content: start;
      min-height: 0;
    }

    .panel h2 {
      margin: 0 0 2px 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .panel p {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: #333;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
    }

    input[type="number"] {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
    }

    .checkbox {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      margin-top: 1px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    button {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #c7c7c7;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      text-align: center;
    }

    button:hover {
      background: #fafafa;
    }

    .stats {
      font-size: 11px;
      line-height: 1.4;
      color: #222;
      background: #fff;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      padding: 8px;
      white-space: pre-line;
    }

    .sim-panel {
      position: relative;
      background: #fff;
      user-select: none;
      cursor: grab;
    }

    .sim-panel.dragging {
      cursor: grabbing;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 800px) {
      html,
      body {
        overflow: auto;
      }

      .layout {
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: auto;
      }

      .panel,
      .sim-panel {
        width: 100%;
        max-width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="panel">
      <div class="panel-inner">
        <div>
          <h2>3D simulace v krychli</h2>
          <p>
            Bod se pohybuje uvnitř krychle, odráží se od stěn a zanechává za sebou trajektorii.
          </p>
        </div>

        <label>
          Počáteční X
          <input id="startX" type="number" value="0" step="0.01" min="-0.999" max="0.999" />
        </label>

        <label>
          Počáteční Y
          <input id="startY" type="number" value="0" step="0.01" min="-0.999" max="0.999" />
        </label>

        <label>
          Počáteční Z
          <input id="startZ" type="number" value="0" step="0.01" min="-0.999" max="0.999" />
        </label>

        <label>
          Rychlost
          <input id="speedMagnitude" type="number" value="0.067" step="0.001" min="0" />
        </label>

        <label>
          Azimut (°)
          <input id="azimuth" type="number" value="68.2" step="0.1" />
        </label>

        <label>
          Elevace (°)
          <input id="elevation" type="number" value="36.7" step="0.1" min="-90" max="90" />
        </label>

        <label>
          Rychlost simulace
          <input id="simSpeed" type="number" value="1" min="1" step="1" />
        </label>

        <label class="checkbox">
          <input id="autoRotate" type="checkbox" checked />
          Automatická rotace
        </label>

        <div class="buttons">
          <button id="toggleBtn" type="button">Pozastavit</button>
          <button id="resetBtn" type="button">Resetovat</button>
          <button id="clearTrailBtn" type="button">Vymazat trajektorii</button>
        </div>

        <div class="stats" id="stats"></div>
      </div>
    </div>

    <div class="sim-panel" id="canvasWrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const startXInput = document.getElementById("startX");
    const startYInput = document.getElementById("startY");
    const startZInput = document.getElementById("startZ");
    const speedMagnitudeInput = document.getElementById("speedMagnitude");
    const azimuthInput = document.getElementById("azimuth");
    const elevationInput = document.getElementById("elevation");
    const simSpeedInput = document.getElementById("simSpeed");
    const autoRotateInput = document.getElementById("autoRotate");
    const statsEl = document.getElementById("stats");
    const toggleBtn = document.getElementById("toggleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const clearTrailBtn = document.getElementById("clearTrailBtn");
    const canvasWrap = document.getElementById("canvasWrap");

    const CUBE_MIN = -1;
    const CUBE_MAX = 1;
    const POSITION_EPS = 0.001;
    const POSITION_MIN = CUBE_MIN + POSITION_EPS;
    const POSITION_MAX = CUBE_MAX - POSITION_EPS;

    const cubeVertices = [
      { x:  1, y: -1, z: -1 },
      { x:  1, y:  1, z: -1 },
      { x: -1, y:  1, z: -1 },
      { x: -1, y: -1, z: -1 },
      { x:  1, y: -1, z:  1 },
      { x:  1, y:  1, z:  1 },
      { x: -1, y: -1, z:  1 },
      { x: -1, y:  1, z:  1 }
    ];

    const cubeEdges = [
      [0, 1], [0, 3], [0, 4],
      [2, 1], [2, 3], [2, 7],
      [6, 3], [6, 4], [6, 7],
      [5, 1], [5, 4], [5, 7]
    ];

    let cw = 600;
    let ch = 600;
    let running = true;
    let bounces = 0;

    const state = {
      pos: { x: 0, y: 0, z: 0 },
      vel: { x: 0.02, y: 0.04, z: 0.05 },
      trail: [],
      yaw: degToRad(35),
      pitch: degToRad(-18),
      autoRotate: true
    };

    const keys = {
      left: false,
      right: false,
      up: false,
      down: false
    };

    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function radToDeg(rad) {
      return rad * 180 / Math.PI;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function normalizeAngle(angle) {
      let a = Number(angle);
      if (!Number.isFinite(a)) a = 0;
      a = a % 360;
      if (a < 0) a += 360;
      return a;
    }

    function sanitizePositionInput(inputEl) {
      let value = Number(inputEl.value);
      if (!Number.isFinite(value)) value = 0;
      value = clamp(value, POSITION_MIN, POSITION_MAX);
      inputEl.value = String(Number(value.toFixed(3)));
      return value;
    }

    function sanitizeSpeedInput() {
      let value = Number(speedMagnitudeInput.value);
      if (!Number.isFinite(value)) value = 0.067;
      value = Math.abs(value);
      value = Number(value.toFixed(4));
      speedMagnitudeInput.value = String(value);
      return value;
    }

    function sanitizeElevationInput() {
      let value = Number(elevationInput.value);
      if (!Number.isFinite(value)) value = 0;
      value = clamp(value, -90, 90);
      value = Number(value.toFixed(3));
      elevationInput.value = String(value);
      return value;
    }

    function sanitizeAzimuthInput() {
      let value = normalizeAngle(azimuthInput.value);
      value = Number(value.toFixed(3));
      azimuthInput.value = String(value);
      return value;
    }

    function resizeCanvas() {
      const rect = canvasWrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      cw = Math.floor(rect.width);
      ch = Math.floor(rect.height);

      canvas.width = Math.floor(cw * dpr);
      canvas.height = Math.floor(ch * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function directionFromAngles(speed, azimuthDeg, elevationDeg) {
      const az = degToRad(azimuthDeg);
      const el = degToRad(elevationDeg);

      const cosEl = Math.cos(el);

      return {
        x: speed * cosEl * Math.cos(az),
        y: speed * Math.sin(el),
        z: speed * cosEl * Math.sin(az)
      };
    }

    function resetSimulation() {
      const px = sanitizePositionInput(startXInput);
      const py = sanitizePositionInput(startYInput);
      const pz = sanitizePositionInput(startZInput);

      const speed = sanitizeSpeedInput();
      const azimuth = sanitizeAzimuthInput();
      const elevation = sanitizeElevationInput();

      state.pos.x = px;
      state.pos.y = py;
      state.pos.z = pz;

      const dir = directionFromAngles(speed, azimuth, elevation);
      state.vel.x = dir.x;
      state.vel.y = dir.y;
      state.vel.z = dir.z;

      state.autoRotate = autoRotateInput.checked;
      state.trail = [];
      bounces = 0;

      updateStats();
      drawScene();
    }

    function clearTrail() {
      state.trail = [];
      updateStats();
      drawScene();
    }

    function stepSimulation() {
      if (!(CUBE_MIN < state.pos.x && state.pos.x < CUBE_MAX)) {
        state.vel.x *= -1;
        bounces++;
      }
      if (!(CUBE_MIN < state.pos.y && state.pos.y < CUBE_MAX)) {
        state.vel.y *= -1;
        bounces++;
      }
      if (!(CUBE_MIN < state.pos.z && state.pos.z < CUBE_MAX)) {
        state.vel.z *= -1;
        bounces++;
      }

      state.pos.x += state.vel.x;
      state.pos.y += state.vel.y;
      state.pos.z += state.vel.z;

      state.trail.push({
        x: state.pos.x,
        y: state.pos.y,
        z: state.pos.z
      });

      if (state.trail.length > 12000) {
        state.trail.splice(0, 4000);
      }
    }

    function rotatePoint(p) {
      const cy = Math.cos(state.yaw);
      const sy = Math.sin(state.yaw);
      const cp = Math.cos(state.pitch);
      const sp = Math.sin(state.pitch);

      const x1 = cy * p.x + sy * p.z;
      const z1 = -sy * p.x + cy * p.z;

      const y2 = cp * p.y - sp * z1;
      const z2 = sp * p.y + cp * z1;

      return { x: x1, y: y2, z: z2 };
    }

    function projectPoint(p) {
      const rotated = rotatePoint(p);
      const cameraZ = 4.2;
      const depth = cameraZ - rotated.z;

      if (depth <= 0.01) {
        return null;
      }

      const focal = Math.min(cw, ch) * 0.72;
      const sx = cw / 2 + (rotated.x * focal) / depth;
      const sy = ch / 2 - (rotated.y * focal) / depth;

      return {
        x: sx,
        y: sy,
        depth: depth
      };
    }

    function drawLine3D(a, b, color, width) {
      const pa = projectPoint(a);
      const pb = projectPoint(b);

      if (!pa || !pb) return;

      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }

    function drawCube() {
      for (const [i1, i2] of cubeEdges) {
        drawLine3D(cubeVertices[i1], cubeVertices[i2], "#000000", 1);
      }
    }

    function drawTrail() {
      if (state.trail.length < 2) return;

      ctx.strokeStyle = "#c40000";
      ctx.lineWidth = 1.2;
      ctx.beginPath();

      let started = false;

      for (let i = 0; i < state.trail.length; i++) {
        const p = projectPoint(state.trail[i]);
        if (!p) continue;

        if (!started) {
          ctx.moveTo(p.x, p.y);
          started = true;
        } else {
          ctx.lineTo(p.x, p.y);
        }
      }

      if (started) {
        ctx.stroke();
      }
    }

    function drawBall() {
      const p = projectPoint(state.pos);
      if (!p) return;

      const radius = clamp(9 / p.depth, 2.5, 6);

      ctx.fillStyle = "#c40000";
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawOverlayText() {
      ctx.fillStyle = "#111111";
      ctx.font = "12px Arial";
      ctx.textBaseline = "top";
      ctx.fillText("3D trajektorie v krychli", 8, 7);
      ctx.fillText("šipky / tažení myší = rotace", 8, 22);
    }

    function drawScene() {
      ctx.clearRect(0, 0, cw, ch);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cw, ch);

      drawCube();
      drawTrail();
      drawBall();
      drawOverlayText();
    }

    function updateViewControls() {
      const rotStep = 0.03;

      if (keys.left) state.yaw -= rotStep;
      if (keys.right) state.yaw += rotStep;
      if (keys.up) state.pitch -= rotStep;
      if (keys.down) state.pitch += rotStep;

      state.pitch = clamp(state.pitch, degToRad(-89), degToRad(89));

      if (state.autoRotate) {
        state.yaw += 0.006;
      }
    }

    function updateStats() {
      const speed =
        Math.sqrt(
          state.vel.x * state.vel.x +
          state.vel.y * state.vel.y +
          state.vel.z * state.vel.z
        );

      statsEl.textContent =
        `Pozice: x = ${state.pos.x.toFixed(3)}, y = ${state.pos.y.toFixed(3)}, z = ${state.pos.z.toFixed(3)}\n` +
        `Rychlost: ${speed.toFixed(4)}\n` +
        `Vektor: x = ${state.vel.x.toFixed(4)}, y = ${state.vel.y.toFixed(4)}, z = ${state.vel.z.toFixed(4)}\n` +
        `Odrazy: ${bounces}\n` +
        `Body trajektorie: ${state.trail.length}\n` +
        `Yaw kamery: ${radToDeg(state.yaw).toFixed(1)}°\n` +
        `Pitch kamery: ${radToDeg(state.pitch).toFixed(1)}°`;
    }

    function animate() {
      updateViewControls();

      if (running) {
        const steps = Math.max(1, Number(simSpeedInput.value) || 1);
        for (let i = 0; i < steps; i++) {
          stepSimulation();
        }
      }

      updateStats();
      drawScene();
      requestAnimationFrame(animate);
    }

    toggleBtn.addEventListener("click", () => {
      running = !running;
      toggleBtn.textContent = running ? "Pozastavit" : "Spustit";
    });

    resetBtn.addEventListener("click", resetSimulation);
    clearTrailBtn.addEventListener("click", clearTrail);

    startXInput.addEventListener("change", resetSimulation);
    startYInput.addEventListener("change", resetSimulation);
    startZInput.addEventListener("change", resetSimulation);
    speedMagnitudeInput.addEventListener("change", resetSimulation);
    azimuthInput.addEventListener("change", resetSimulation);
    elevationInput.addEventListener("change", resetSimulation);
    simSpeedInput.addEventListener("change", updateStats);
    autoRotateInput.addEventListener("change", () => {
      state.autoRotate = autoRotateInput.checked;
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") {
        keys.left = true;
        e.preventDefault();
      }
      if (e.key === "ArrowRight") {
        keys.right = true;
        e.preventDefault();
      }
      if (e.key === "ArrowUp") {
        keys.up = true;
        e.preventDefault();
      }
      if (e.key === "ArrowDown") {
        keys.down = true;
        e.preventDefault();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft") keys.left = false;
      if (e.key === "ArrowRight") keys.right = false;
      if (e.key === "ArrowUp") keys.up = false;
      if (e.key === "ArrowDown") keys.down = false;
    });

    canvasWrap.addEventListener("mousedown", (e) => {
      isDragging = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
      canvasWrap.classList.add("dragging");
    });

    window.addEventListener("mouseup", () => {
      isDragging = false;
      canvasWrap.classList.remove("dragging");
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;

      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;

      state.yaw += dx * 0.01;
      state.pitch += dy * 0.01;
      state.pitch = clamp(state.pitch, degToRad(-89), degToRad(89));

      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    resetSimulation();
    animate();
  </script>
</body>
</html>
